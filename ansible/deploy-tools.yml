---
# =============================================================================
# Deploy Observability Tools to Agent Node (Air-Gapped Compatible)
# =============================================================================
# This playbook deploys cAdvisor, Node Exporter, and Filebeat to remote agent
# nodes that may have NO internet access. It uses a "Controller-to-Remote"
# image transfer pattern:
#   1. Export Docker images as .tar on the controller (delegate_to: localhost)
#   2. Copy .tar files to the remote node via SSH
#   3. Load images into Docker on the remote node
#   4. Run the containers
# The remote user only needs docker group membership (no sudo required).
# =============================================================================
- name: Deploy Observability Tools to Agent Node
  hosts: "{{ target_host | default('all') }}"
  any_errors_fatal: yes

  vars:
    filebeat_version: "8.11.1"
    # Passed by backend via -e central_logstash_ip=<env.centralNodeIp>
    central_logstash_ip: "{{ central_logstash_ip | default('') }}"
    env_label: "{{ environment_label | default('production') }}"
    # Controller-side cache (persists on host via gitops volume mount)
    image_cache_dir: "/app/gitops/image-cache"
    # Remote-side staging dir (in user's home, avoids /tmp permission issues)
    remote_image_dir: "~/monetique-images"

  pre_tasks:
    - name: Pre-flight Check - Verify connectivity
      ping:

  tasks:
    # =========================
    #  Prepare Images on Controller (delegated)
    # =========================
    - name: Ensure image cache directory exists on controller
      file:
        path: "{{ image_cache_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Check if cAdvisor tarball is cached
      stat:
        path: "{{ image_cache_dir }}/cadvisor.tar"
      register: cadvisor_tar_check
      delegate_to: localhost
      run_once: true

    - name: Export cAdvisor image on controller
      shell: "docker save -o {{ image_cache_dir }}/cadvisor.tar gcr.io/cadvisor/cadvisor:latest"
      delegate_to: localhost
      run_once: true
      when: not cadvisor_tar_check.stat.exists

    - name: Check if Node Exporter tarball is cached
      stat:
        path: "{{ image_cache_dir }}/node-exporter.tar"
      register: node_exporter_tar_check
      delegate_to: localhost
      run_once: true

    - name: Export Node Exporter image on controller
      shell: "docker save -o {{ image_cache_dir }}/node-exporter.tar prom/node-exporter:latest"
      delegate_to: localhost
      run_once: true
      when: not node_exporter_tar_check.stat.exists

    - name: Check if Filebeat tarball is cached
      stat:
        path: "{{ image_cache_dir }}/filebeat.tar"
      register: filebeat_cache_check
      delegate_to: localhost
      run_once: true

    - name: Export Filebeat image on controller
      shell: "docker save -o {{ image_cache_dir }}/filebeat.tar docker.elastic.co/beats/filebeat:{{ filebeat_version }}"
      delegate_to: localhost
      run_once: true
      when: not filebeat_cache_check.stat.exists

    - name: Ensure tarballs are readable
      file:
        path: "{{ image_cache_dir }}/{{ item }}"
        mode: '0644'
      loop:
        - cadvisor.tar
        - node-exporter.tar
        - filebeat.tar
      delegate_to: localhost
      run_once: true

    # =========================
    #  Prepare Remote Staging Dir
    # =========================
    - name: Ensure remote image directory exists
      shell: "mkdir -p ~/monetique-images"
      args:
        executable: /bin/bash
      changed_when: false

    # =========================
    #  cAdvisor
    # =========================
    - name: Detect existing cAdvisor container
      shell: |
        docker inspect -f '{% raw %}{{range $p, $conf := .NetworkSettings.Ports}}{{(index $conf 0).HostPort}}{{end}}{% endraw %}' cadvisor || echo ""
      register: existing_cadvisor_port
      changed_when: false
      ignore_errors: yes

    - name: Set cAdvisor Port Fact
      set_fact:
        final_cadvisor_port: "{{ existing_cadvisor_port.stdout | default('8085') }}"

    - name: Output Final cAdvisor Port for Backend
      debug:
        msg: "FINAL_CADVISOR_PORT={{ final_cadvisor_port }}"

    - name: Transfer cAdvisor image to remote
      copy:
        src: "{{ image_cache_dir }}/cadvisor.tar"
        dest: "{{ remote_image_dir }}/cadvisor.tar"
        mode: '0644'
      when: existing_cadvisor_port.stdout | default('') == ""

    - name: Load cAdvisor image into Docker
      shell: "docker load -i ~/monetique-images/cadvisor.tar"
      when: existing_cadvisor_port.stdout | default('') == ""

    - name: Run cAdvisor (Only if not already running)
      shell: |
        docker run -d --name cadvisor \
        --restart=always \
        -p {{ final_cadvisor_port }}:8080 \
        -v /:/rootfs:ro,z \
        -v /var/run:/var/run:ro,z \
        -v /sys:/sys:ro,z \
        -v /var/lib/docker/:/var/lib/docker:ro,z \
        -v /dev/disk/:/dev/disk:ro,z \
        -v /data:/data:ro,z \
        gcr.io/cadvisor/cadvisor:latest
      args:
        executable: /bin/bash
      when: existing_cadvisor_port.stdout | default('') == ""

    - name: Cleanup cAdvisor tarball from remote
      file:
        path: "{{ remote_image_dir }}/cadvisor.tar"
        state: absent
      when: existing_cadvisor_port.stdout | default('') == ""

    # =========================
    #  Node Exporter
    # =========================
    - name: Detect existing Node Exporter container
      shell: |
        docker inspect -f '{% raw %}{{range $p, $conf := .NetworkSettings.Ports}}{{(index $conf 0).HostPort}}{{end}}{% endraw %}' node-exporter || echo ""
      register: existing_node_exporter_port
      changed_when: false
      ignore_errors: yes

    - name: Set Node Exporter Port Fact
      set_fact:
        final_node_exporter_port: "{{ existing_node_exporter_port.stdout | default('9100') }}"

    - name: Output Final Node Exporter Port for Backend
      debug:
        msg: "FINAL_NODE_EXPORTER_PORT={{ final_node_exporter_port }}"

    - name: Transfer Node Exporter image to remote
      copy:
        src: "{{ image_cache_dir }}/node-exporter.tar"
        dest: "{{ remote_image_dir }}/node-exporter.tar"
        mode: '0644'
      when: existing_node_exporter_port.stdout | default('') == ""

    - name: Load Node Exporter image into Docker
      shell: "docker load -i ~/monetique-images/node-exporter.tar"
      when: existing_node_exporter_port.stdout | default('') == ""

    - name: Run Node Exporter (Only if not already running)
      shell: |
        docker run -d --name node-exporter \
        --restart=always \
        -p {{ final_node_exporter_port }}:9100 \
        -v /:/host:ro,rslave,z \
        -v /data:/data:ro,z \
        prom/node-exporter:latest \
        --path.rootfs=/host
      args:
        executable: /bin/bash
      when: existing_node_exporter_port.stdout | default('') == ""

    - name: Cleanup Node Exporter tarball from remote
      file:
        path: "{{ remote_image_dir }}/node-exporter.tar"
        state: absent
      when: existing_node_exporter_port.stdout | default('') == ""

    - name: Debug Central Logstash IP
      debug:
        msg: "Attempting to connect to central Logstash at {{ central_logstash_ip }}:5045"



    # =========================
    #  Filebeat
    # =========================
    - name: Check if Filebeat container is already running
      shell: "docker inspect -f '{% raw %}{{.State.Status}}{% endraw %}' filebeat 2>/dev/null || echo 'none'"
      register: filebeat_status_check
      changed_when: false
      ignore_errors: yes

    - name: Transfer Filebeat image to remote
      copy:
        src: "{{ image_cache_dir }}/filebeat.tar"
        dest: "{{ remote_image_dir }}/filebeat.tar"
        mode: '0644'
      when: filebeat_status_check.stdout != 'running'

    - name: Load Filebeat image into Docker
      shell: "docker load -i ~/monetique-images/filebeat.tar"
      when: filebeat_status_check.stdout != 'running'

    - name: Transfer Filebeat config for remote node
      template:
        src: "../vmpipe/filebeat/remote_filebeat.yml"
        dest: "/home/{{ ansible_user }}/filebeat.yml"
        mode: '0644'
      when: filebeat_status_check.stdout != 'running'

    - name: Run Filebeat
      shell: |
        docker rm -f filebeat || true
        docker run -d --name filebeat \
        --restart=always \
        --user root \
        -p 5066:5066 \
        -v /home/{{ ansible_user }}/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro,z \
        -v /var/lib/docker/containers:/var/lib/docker/containers:ro,z \
        -v /var/run/docker.sock:/var/run/docker.sock:ro,z \
        docker.elastic.co/beats/filebeat:{{ filebeat_version }} filebeat -e -strict.perms=false
      args:
        executable: /bin/bash
      when: filebeat_status_check.stdout != 'running'

    - name: Cleanup Filebeat tarball from remote
      file:
        path: "{{ remote_image_dir }}/filebeat.tar"
        state: absent
      when: filebeat_status_check.stdout != 'running'

    # =========================
    #  Final Cleanup
    # =========================
    - name: Remove remote image directory if empty
      shell: "rmdir ~/monetique-images 2>/dev/null || true"
      changed_when: false