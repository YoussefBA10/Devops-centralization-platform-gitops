---
- name: Deploy Frontend Application to Agent Node
  hosts: agents
  become:yes
  vars:
    appName: "frontend"
    image_tag: "v1"
    central_ip: "" # Overridden by backend

  tasks:
    - name: Remove old frontend container if exists
      shell: "docker rm -f {{ appName }} || true"
      changed_when: false

    - name: Run Frontend Container
      shell: |
        docker run -d --name {{ appName }} \
        --restart=always \
        --log-driver json-file \
        --label com.monetique.service="{{ appName }}" \
        --label com.monetique.environment={{ env_label | default('production') }} \
        --label node={{ ansible_hostname }} \
        -p 80:80 \
        {{ appName }}:{{ image_tag }}
      args:
        executable: /bin/bash
