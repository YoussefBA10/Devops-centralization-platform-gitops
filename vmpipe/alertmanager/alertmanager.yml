global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: '__SMTP_FROM__'
  smtp_auth_username: '__SMTP_USERNAME__'
  smtp_auth_password: '__SMTP_PASSWORD__'
  smtp_require_tls: true

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'severity', 'environment']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'monetique-backend'

  routes:
    - match:
        severity: critical
      receiver: 'monetique-backend'
      continue: true
    - match:
        severity: critical
      receiver: 'email-critical'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'email-notifications'
      repeat_interval: 4h

receivers:
  - name: 'monetique-backend'
    webhook_configs:
      - url: 'http://backend:8880/api/alerts/ingest'
        send_resolved: true

  - name: 'email-notifications'
    email_configs:
      - to: '__ALERT_RECIPIENT__'
        headers:
          Subject: '{{ template "email.monetique.subject" . }}'
        html: '{{ template "email.monetique.html" . }}'
        send_resolved: true

  - name: 'email-critical'
    email_configs:
      - to: '__ALERT_RECIPIENT__'
        headers:
          Subject: '{{ template "email.monetique.subject" . }}'
        html: '{{ template "email.monetique.html" . }}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
