input {
  # Beats protocol from Filebeat
  beats {
    port => 5045
    tags => ["filebeat"]
  }

  # Direct TCP JSON input for legacy apps or direct log shipping
  tcp {
    port => 5044
    codec => json
    tags => ["direct-json"]
  }

  # Poll Loki API with a strict 5-minute sliding window
  exec {
    command => 'curl -s "http://172.17.5.190:3100/loki/api/v1/query_range?query=%7Bjob%3D~%22.%2B%22%7D&limit=5000&start=$(expr $(date +%s) - 300)000000000"'
    interval => 30
    codec => "plain"
    type => "loki"
  }
}


filter {

  # ============================================================
  # LOKI: Parse raw curl response and split into individual events
  # ============================================================
  if [type] == "loki" {
    json {
      source => "message"
      target => "loki_response"
    }

    ruby {
      code => "
        begin
          response = event.get('loki_response')

          if response && response['data'] && response['data']['result']
            response['data']['result'].each do |result|
              labels = result['stream'] || {}
              (result['values'] || []).each do |val|
                new_ev = LogStash::Event.new
                ts_ns = val[0].to_i
                new_ev.set('@timestamp', LogStash::Timestamp.at(ts_ns / 1000000000, (ts_ns % 1000000000) / 1000))
                new_ev.set('message', val[1])
                labels.each { |k, v| new_ev.set(k, v) }
                new_ev.set('type', 'loki_parsed')
                new_ev.set('ingest_source', 'loki')
                new_event_block.call(new_ev)
              end
            end
          end

          event.cancel()
        rescue => e
          event.tag('_rubyexception')
          event.set('ruby_error', e.message)
        end
      "
    }

    # Mapping fields for the unified classification block
    mutate {
      rename => { "host" => "node" }
    }
  }

  # ============================================================
  # LOKI_PARSED: Deduplicate using deterministic fingerprint
  # ============================================================
  if [type] == "loki_parsed" {
    fingerprint {
      source => ["message", "@timestamp"]
      target => "[@metadata][fingerprint]"
      method => "SHA1"
      key => "monetique"
    }
  }

  # ============================================================
  # FILEBEAT / TCP: All standard pipeline processing
  # Skip loki raw poller events and already-processed loki_parsed events
  # ============================================================
  if [type] != "loki" and [type] != "loki_parsed" {


    # 1. Handle Filebeat Docker metadata & ECS host clash
    if [host] and ![host][name] {
      mutate {
        rename => { "host" => "host_ip" }
      }
    }

    if [container] or [docker] {
      mutate {
        add_field => {
          "service"      => "%{[container][name]}"
          "service_name" => "%{[container][name]}"
        }
      }

      if [docker][labels][com.monetique.service] {
        mutate {
          replace => { "service"      => "%{[docker][labels][com.monetique.service]}" }
          replace => { "service_name" => "%{[docker][labels][com.monetique.service]}" }
        }
      } else if [container][labels][com.monetique.service] {
        mutate {
          replace => { "service"      => "%{[container][labels][com.monetique.service]}" }
          replace => { "service_name" => "%{[container][labels][com.monetique.service]}" }
        }
      }

      mutate {
        gsub => [
          "service",      "^/", "",
          "service_name", "^/", ""
        ]
      }
    }

    # Add service_name alias if not present
    if ![service_name] and [service] {
      mutate { add_field => { "service_name" => "%{service}" } }
    } else if ![service] and [service_name] {
      mutate { add_field => { "service" => "%{service_name}" } }
    }

    # Ensure service name is lowercase and normalized (strip docker compose prefixes/suffixes)
    if [service] {
      mutate {
        lowercase => ["service", "service_name"]
        gsub => [
          "service", "^[a-z0-9]+_", "",
          "service", "_[0-9]+$", "",
          "service_name", "^[a-z0-9]+_", "",
          "service_name", "_[0-9]+$", ""
        ]
      }
    }

    # 2. Normalize common fields
    mutate {
      rename => {
        "[message]"        => "raw_message"
        "[log][file][path]" => "log_path"
      }
      strip => ["raw_message"]
    }

    # 3. Extract environment from Docker labels
    if ![environment] {
      if [docker][labels][com.monetique.environment] {
        mutate {
          add_field => { "environment" => "%{[docker][labels][com.monetique.environment]}" }
        }
      } else if [container][labels][env] {
        mutate {
          add_field => { "environment" => "%{[container][labels][env]}" }
        }
      }
    }

    # 4. Extract node from Docker labels or container ID
    if ![node] {
      if [docker][labels][node] {
        mutate { add_field => { "node" => "%{[docker][labels][node]}" } }
      } else if [container][labels][node] {
        mutate { add_field => { "node" => "%{[container][labels][node]}" } }
      } else if [container][id] {
        mutate { add_field => { "node" => "%{[container][id]}" } }
      }
    }

    # Fallback environment
    if ![environment] {
      mutate {
        add_field => { "environment" => "unknown" }
      }
    }

    # Ensure environment is lowercase for index naming
    mutate {
      lowercase => ["environment"]
    }

    # 5. Try to parse raw_message as JSON (common for Express/Node.js apps)
    if [raw_message] =~ /^\{.*\}$/ {
      json {
        source => "raw_message"
        target => "parsed_json"
      }
      if [parsed_json] {
        mutate {
          rename => {
            "[parsed_json][level]"     => "level"
            "[parsed_json][message]"   => "message"
            "[parsed_json][timestamp]" => "timestamp"
          }
          add_tag => ["json_parsed"]
        }
      }
    }

    # 6. Grok fallback parsing (with SRE intelligence)
    if !("json_parsed" in [tags]) {
      grok {
        match => {
          "raw_message" => [
            # 1. Structured access log: [ACCESS] GET /api/v1/test 500
            "\[ACCESS\] %{WORD:http_method} %{URIPATHPARAM:uri} %{INT:status_code}",

            # 2. Database Pool Signals: pool.active=50 pool.max=50 waited 500ms
            "pool\.active=%{INT:pool_active:int} pool\.max=%{INT:pool_max:int}( waited %{INT:wait_ms:int}ms)?",

            # 3. Memory Signals: heap usage above 90%
            "heap usage (above|at) %{INT:heap_pct:int}%",

            # 4. Circuit Breaker Signals: circuit-breaker:open
            "circuit-breaker:%{WORD:circuit_breaker_state}",

            # 5. Exception Recognition: java.lang.NullPointerException
            "(?i)%{JAVACLASS:exception_type}",

            # 6. Spring Boot standard: 2026-05-15T... ERROR 1 --- [ thread ] class : message
            "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:message}",
            "%{LOGLEVEL:level}%{SPACE}: %{GREEDYDATA:message}",
            "%{GREEDYDATA:message}"
          ]
        }
        tag_on_failure => ["_grok_message_fail"]
      }
    }

    # If it was an access log, ensure category is NETWORK and message is clean
    if [uri] {
      mutate {
        replace => { "category" => "NETWORK" }
        replace => { "message" => "Access %{http_method} %{uri} Status %{status_code}" }
      }
    }

    # Cleanup for the unified classification block
    if ![level] and [extracted_level] {
      mutate { add_field => { "level" => "%{extracted_level}" } }
    }

    if ![message] and [raw_message] {
      mutate { add_field => { "message" => "%{raw_message}" } }
    }

    # 9. Human-readable normalized summary
    mutate {
      add_field => {
        "normalized_summary" => "%{category} - %{severity}: %{message}"
      }
    }

    # 10. Clean up unnecessary fields
    mutate {
      remove_field => ["beat", "prospector", "input", "offset", "log", "@version"]
    }

    # 11. Parse timestamp
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

  } # end if type != loki/loki_parsed

  # ============================================================
  # SERVICE NAME MAPPING: Resolve container vs logical name
  # ============================================================
  if [service] =~ /angular-nginx-app/ or [service_name] =~ /angular-nginx-app/ or [container][name] =~ /angular-nginx-app/ or [job] =~ /angular-nginx-app/ or [service] == "frontend-service" {
    mutate {
      replace => { 
        "service" => "frontend-service"
        "service_name" => "frontend-service"
        "job" => "frontend-service"
        "app_alias" => "angular-nginx-app"
      }
    }
  }

  # ============================================================
  # UNIFIED CLASSIFICATION: Applies to all logs (Loki + Filebeat)
  # ============================================================
  if [type] == "loki_parsed" or [type] != "loki" {
    
    # 1. Level Extraction (Priority: extracted level > raw message scan > detected_level)
    if ![severity] {
      grok {
        match => { "message" => "(?i)%{LOGLEVEL:extracted_level}" }
        tag_on_failure => []
      }
      
      if [extracted_level] {
        mutate { replace => { "severity" => "%{extracted_level}" } }
      } else if [message] =~ /(?i)(exception|error|fail|timeout|connection refused)/ {
        mutate { replace => { "severity" => "ERROR" } }
      } else if [message] =~ /(?i)(warn|warning)/ {
        mutate { replace => { "severity" => "WARN" } }
      } else if [detected_level] {
        mutate { replace => { "severity" => "%{detected_level}" } }
      } else {
        mutate { replace => { "severity" => "INFO" } }
      }
    }

    mutate { uppercase => ["severity"] }

    # 2. Category Classification
    if [message] =~ /(?i)hibernate|jpa|sql|query|database|datasource|jdbc/ {
      mutate { replace => { "category" => "DATABASE" } }
    } else if [message] =~ /(?i)security|auth|login|sign-in|jwt|token|principal/ {
      mutate { replace => { "category" => "SECURITY" } }
    } else if [message] =~ /(?i)http|rest|api|endpoint|request|response|controller|network/ {
      mutate { replace => { "category" => "NETWORK" } }
    } else if [message] =~ /(?i)external|third.party|oauth|api.gateway/ {
      mutate { replace => { "category" => "EXTERNAL" } }
    } else {
      mutate { replace => { "category" => "APPLICATION" } }
    }

    # 3. Final Summary & Cleanup
    mutate {
      replace => { "normalized_summary" => "[%{category}] %{message}" }
    }
  }
}


output {
  if [type] == "loki_parsed" {
    elasticsearch {
      hosts         => ["elasticsearch:9200"]
      index         => "loki-logs-%{+YYYY.MM.dd}"
      document_id   => "%{[@metadata][fingerprint]}"
      document_type => "_doc"
      user          => "${ELASTIC_USER:elastic}"
      password      => "${ELASTIC_PASSWORD:changeme}"
      manage_template => false
    }
  } else if [type] != "loki" {
    elasticsearch {
      hosts         => ["elasticsearch:9200"]
      index         => "app-logs-%{[environment]}-%{+YYYY.MM.dd}"
      document_type => "_doc"
      user          => "${ELASTIC_USER:elastic}"
      password      => "${ELASTIC_PASSWORD:changeme}"
      manage_template => false
    }
  }
  # type == "loki" (raw poller events) are intentionally dropped here
}