groups:
  - name: "system_alerts"
    rules:
      - alert: "NodeUnreachable"
        expr: "up{job='node-exporter'} == 0"
        for: "1m"
        labels:
          severity: "critical"
        annotations:
          summary: "Node {{ $labels.nodename }} is unreachable"
          description: "The monitoring agent on {{ $labels.nodename }} ({{ $labels.instance }}) has been down for more than 1 minute. The host might be powered off or network isolated."

      - alert: "HighCpuUsage"
        expr: "100 - (avg by(instance, nodename, environment) (rate(node_cpu_seconds_total{mode='idle'}[2m])) * 100) > 85"
        for: "2m"
        labels:
          severity: "warning"
        annotations:
          summary: "High CPU usage on {{ $labels.nodename }}"
          description: "CPU usage on node {{ $labels.nodename }} is currently {{ $value | printf \"%.2f\" }}%."

      - alert: "HighMemoryUsage"
        expr: "((node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes) * 100 > 90"
        for: "2m"
        labels:
          severity: "warning"
        annotations:
          summary: "High memory usage on {{ $labels.nodename }}"
          description: "Memory usage on node {{ $labels.nodename }} is currently {{ $value | printf \"%.2f\" }}%."

      - alert: "NodeDiskSpaceLow"
        expr: |
          (node_filesystem_free_bytes{mountpoint="/data", fstype=~"ext4|xfs"} / node_filesystem_size_bytes{mountpoint="/data"} * 100 < 15)
          or
          (
            (node_filesystem_free_bytes{mountpoint="/", fstype=~"ext4|xfs"} / node_filesystem_size_bytes{mountpoint="/"} * 100 < 15)
            unless 
            count by (instance, nodename) (node_filesystem_size_bytes{mountpoint="/data"}) > 0
          )
        for: "5m"
        labels:
          severity: "warning"
        annotations:
          summary: "Node {{ $labels.nodename }} disk space low"
          description: "Disk space on {{ $labels.nodename }} ({{ $labels.mountpoint }}) is below 15%."

  - name: "application_alerts"
    rules:
      - alert: "FrontendDown"
        expr: 'time() - container_last_seen{container_label_com_monetique_category="frontend", container_label_is_canary!="true", name!=""} > 60'
        for: "2m"
        labels:
          severity: "critical"
          application: "frontend"
        annotations:
          summary: "Frontend {{ $labels.container_label_app }} is down"
          description: "Frontend container {{ $labels.name }} is down."

      - alert: "BackendDown"
        expr: |
          (up{job='monetique-backend'} == 0)
          or (time() - container_last_seen{container_label_com_monetique_category='backend', container_label_is_canary!~"(?i)true", name!=''} > 60)
        for: "2m"
        labels:
          severity: "critical"
          application: "backend"
        annotations:
          summary: "Backend {{ if $labels.container_label_app }}{{ $labels.container_label_app }}{{ else }}Service{{ end }} is down"
          description: "Backend {{ $labels.name }} on {{ if $labels.nodename }}{{ $labels.nodename }}{{ else }}{{ $labels.instance }}{{ end }} is unreachable."

      - alert: "HighErrorRate"
        expr: "sum by (job, instance, nodename) (rate(http_server_requests_seconds_count{status=~\"5..\"}[2m])) / sum by (job, instance, nodename) (rate(http_server_requests_seconds_count[2m])) * 100 > 5"
        for: "2m"
        labels:
          severity: "critical"
          application: "{{ $labels.job }}"
          service_name: "{{ $labels.job }}"
        annotations:
          summary: "High HTTP error rate on {{ $labels.job }}"
          description: "More than 5% of requests to {{ $labels.job }} ({{ $labels.instance }}) are failing with 5xx errors."

      - alert: "HighLatency"
        expr: "histogram_quantile(0.95, sum by (le, job, uri, nodename) (rate(http_server_requests_seconds_bucket[5m]))) > 2.0"
        for: "5m"
        labels:
          severity: "warning"
          application: "{{ $labels.job }}"
          service_name: "{{ $labels.job }}"
        annotations:
          summary: "High latency on {{ $labels.job }}"
          description: "95th percentile latency for {{ $labels.uri }} on {{ $labels.job }} is > 2 seconds."

  - name: "container_alerts"
    rules:
      - alert: "ContainerOOMKilled"
        expr: "rate(container_oom_events_total{container_label_is_canary!~\"(?i)true\", name!=''}[5m]) > 0"
        for: "1m"
        labels:
          severity: "critical"
          application: "{{ $labels.name }}"
        annotations:
          summary: "Container {{ $labels.name }} OOM Killed"
          description: "Container {{ $labels.name }} on {{ $labels.nodename }} was killed due to out of memory."

      - alert: "ContainerHighMemory"
        expr: "(container_memory_usage_bytes{container_label_is_canary!='true', name!=\"\"} / (container_spec_memory_limit_bytes{container_label_is_canary!='true', name!=\"\"} > 0)) * 100 > 90"
        for: "5m"
        labels:
          severity: "warning"
          application: "{{ $labels.name }}"
        annotations:
          summary: "Container {{ $labels.name }} using high memory"
          description: "Container {{ $labels.name }} on {{ $labels.nodename }} is using >90% of its memory limit."

      - alert: "ContainerHighCPU"
        expr: "(sum by(name, nodename) (rate(container_cpu_usage_seconds_total{container_label_is_canary!='true', name!=\"\"}[2m])) / sum by(name, nodename) (container_spec_cpu_quota / container_spec_cpu_period)) * 100 > 90 or rate(container_cpu_usage_seconds_total{container_label_is_canary!='true', name!=\"\"}[2m]) * 100 > 90"
        for: "5m"
        labels:
          severity: "warning"
          application: "{{ $labels.name }}"
        annotations:
          summary: "Container {{ $labels.name }} using high CPU"
          description: "Container {{ $labels.name }} on {{ $labels.nodename }} is using high CPU."

      - alert: "ContainerCPUFreeze"
        expr: "rate(container_cpu_cfs_throttled_seconds_total{container_label_is_canary!='true', name!=\"\"}[5m]) > 0.5"
        for: "5m"
        labels:
          severity: "warning"
          application: "{{ $labels.name }}"
        annotations:
          summary: "Container {{ $labels.name }} CPU throttled"
          description: "Container {{ $labels.name }} on {{ $labels.nodename }} is being heavily CPU throttled."

      - alert: "ContainerRestartLoop"
        expr: "changes(container_start_time_seconds{container_label_is_canary!='true', name!=\"\"}[15m]) > 2"
        for: "15m"
        labels:
          severity: "critical"
          application: "{{ $labels.name }}"
        annotations:
          summary: "Container {{ $labels.name }} in restart loop"
          description: "Container {{ $labels.name }} on {{ $labels.nodename }} restarted >2 times in 15 minutes."
