groups:
  - name: "prediction_alerts"
    rules:
      - alert: "DiskFullSoon"
        expr: "predict_linear(node_filesystem_free_bytes{mountpoint='/'}[1h], 4 * 3600) < 0"
        for: "5m"
        labels:
          severity: "warning"
        annotations:
          summary: "Disk will be full in less than 4 hours"
          description: "Disk on {{ $labels.instance }} is predicted to be full in 4 hours based on recent usage."
