filebeat.inputs:
- type: container
  id: docker-container-logs
  enabled: true
  paths:
    - /var/lib/docker/containers/*/*.log
  multiline.pattern: '^([0-9]{4}-[0-9]{2}-[0-9]{2}|time=)'
  multiline.negate: true
  multiline.match: after

- type: filestream
  id: system-logs
  enabled: false
  paths:
    - /var/log/*.log

processors:
  - add_docker_metadata: ~
  - add_host_metadata: ~
  - add_fields:
      target: ''
      fields:
        node: "central-node"

output.logstash:
  hosts: ["logstash:5045"]

logging.level: info
filebeat.config.modules:
  path: ${path.config}/modules.d/*.yml
  reload.enabled: false

setup.template.settings:
  index.number_of_shards: 1

http.enabled: true
http.host: 0.0.0.0
http.port: 5066
