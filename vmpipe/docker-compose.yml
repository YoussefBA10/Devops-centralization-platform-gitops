version: '3.8'

services:
  # --- Infrastructure / Database ---
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    ports:
      - "8200:8200"
    environment:
      - VAULT_ADDR=http://127.0.0.1:8200
    volumes:
      - ./vault/config:/vault/config
      - vault_data:/vault/file
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.json
    networks:
      - monetique-eye-net

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    environment:
      MYSQL_DATABASE: "monetique_eye_db"
      MYSQL_USER: "youss"
      # Note: MYSQL_PASSWORD and MYSQL_ROOT_PASSWORD must be fetched from Vault and passed during fresh deployment
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ../../data/mysql:/var/lib/mysql
    healthcheck:

      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monetique-eye-net

  # --- Observability Stack ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    user: root
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - ./prometheus/prediction_rules.yml:/etc/prometheus/prediction_rules.yml
      - ./prometheus/file_sd:/etc/prometheus/file_sd
      - ./prometheus/conf.d:/etc/prometheus/conf.d
      - ./prometheus/rules:/etc/prometheus/rules
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    healthcheck:
      test: ["CMD", "wget", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - monetique-eye-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /data:/data:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - --collector.filesystem.mount-points-exclude
      - "^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - monetique-eye-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /data:/data:ro
    ports:
      - "8085:8080"
    networks:
      - monetique-eye-net
      
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.1
    container_name: filebeat
    user: root
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    command: filebeat -e -strict.perms=false
    ports:
      - "5066:5066"
    depends_on:
      - logstash
    networks:
      - monetique-eye-net

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox:/etc/blackbox_exporter
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    networks:
      - monetique-eye-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    environment:
      SMTP_FROM: ${SMTP_FROM:-monetique.eye.alerts@gmail.com}
      SMTP_USERNAME: ${SMTP_USERNAME:-monetique.eye.alerts@gmail.com}
      # Note: SMTP_PASSWORD must be fetched from Vault
      # SMTP_PASSWORD: ${SMTP_PASSWORD}
      ALERT_RECIPIENT: ${ALERT_RECIPIENT:-ops@monetique.tn}
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp /etc/alertmanager/alertmanager.yml /tmp/alertmanager.yml
        sed -i "s|__SMTP_FROM__|$$SMTP_FROM|g" /tmp/alertmanager.yml
        sed -i "s|__SMTP_USERNAME__|$$SMTP_USERNAME|g" /tmp/alertmanager.yml
        sed -i "s|__SMTP_PASSWORD__|$$SMTP_PASSWORD|g" /tmp/alertmanager.yml
        sed -i "s|__ALERT_RECIPIENT__|$$ALERT_RECIPIENT|g" /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates
    networks:
      - monetique-eye-net
  

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    # environment:
      # Note: GRAFANA_ADMIN_PASSWORD must be fetched from Vault
      # - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - monetique-eye-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    container_name: elasticsearch
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ../../data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - monetique-eye-net

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.9
    container_name: logstash
    restart: unless-stopped
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
        - "5044:5044"
        - "5045:5045"
        - "5000:5000"
        - "9600:9600"
    environment:
      - ELASTIC_USER=${ELASTIC_USER:-elastic}
      # Note: ELASTIC_PASSWORD must be fetched from Vault
      # - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - LS_JAVA_OPTS=-Xms256m -Xmx512m
    depends_on:
      - elasticsearch
    networks:
      - monetique-eye-net

  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.5.0
    container_name: elasticsearch-exporter
    restart: always
    command:
      - '--es.uri=http://elasticsearch:9200'
    ports:
      - "9114:9114"
    depends_on:
      - elasticsearch
    networks:
      - monetique-eye-net

  sonarqube:
    image: sonarqube:9.9-community
    container_name: sonarqube
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
      com.monetique.environment: "central-node"
      com.monetique.category: "ci-cd"
    ports:
      - "9000:9000"
    environment:
      - SONAR_WEB_JAVAOPTS=-Xmx256m -Xms128m
      - SONAR_CE_JAVAOPTS=-Xmx256m -Xms128m
      - SONAR_SEARCH_JAVAOPTS=-Xmx512m -Xms256m
    mem_limit: 1.5g
    deploy:
      resources:
        limits:
          memory: 1.5G
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - monetique-eye-net

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: always
    user: root
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
      com.monetique.environment: "central-node"
      com.monetique.category: "ci-cd"
    ports:
      - "8082:8080"
      - "50000:50000"
    volumes:
      - ../../data/jenkins:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Xmx512m
    networks:
      - monetique-eye-net

  
  falco:
    image: falcosecurity/falco:0.39.2
    container_name: falco
    restart: always
    privileged: true
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    command: ["falco", "-o", "engine.kind=modern_ebpf"]
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /etc:/host/etc:ro
      - ./falco/falco.yaml:/etc/falco/falco.yaml:ro
      - ../ansible/falco_rules.local.yaml:/etc/falco/falco_rules.local.yaml:ro
    environment:
      - FALCO_HTTP_OUTPUT_ENABLED=true
      - FALCO_HTTP_OUTPUT_URL=http://backend:8880/api/security/falco/ingest
      - FALCO_HTTP_OUTPUT_USER_AGENT=falco/monetique
    networks:
      - monetique-eye-net
      
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    ports:
      - "8000:8000"
      - "9443:9443"
      - "9002:9002" 
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - monetique-eye-net
      
# --- Application Stack ---
  backend:
    image: localhost:8083/monetique/monetique-backend:latest
    container_name: backend
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
      com.monetique.environment: "central-node"
      com.monetique.category: "backend"
    volumes:
      - ../../gitops:/app/gitops
      - ./prometheus/conf.d:/opt/monitoring/prometheus/conf.d
      - ./prometheus/rules:/opt/monitoring/prometheus/rules
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      VAULT_ROLE_ID: ${VAULT_ROLE_ID}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID}
      VAULT_URI: "http://vault:8200"
      SERVER_PORT: "8880"
      NODE_NAME: "central-node"
      PROMETHEUS_URL: "http://prometheus:9090"
      MONITORING_PROMETHEUS_RELOAD_URL: "http://prometheus:9090/-/reload"
      MONITORING_BLACKBOX_EXPORTER_URL: "blackbox-exporter:9115"
      MONETIQUE_GITOPS_PATH: "./gitops"
    ports:
      - "8880:8880"
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monetique-eye-net
#33
  frontend:
    image: localhost:8083/monetique/monetique-frontend:latest
    container_name: frontend
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
      com.monetique.environment: "central-node"
      com.monetique.category: "frontend"
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - monetique-eye-net


volumes:
  mysql_data:
  prometheus_data:
  elasticsearch_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  vault_data:
  portainer_data:

networks:
  monetique-eye-net:
    driver: bridge

